services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: htasker:latest
    container_name: htasker-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/htasker?replicaSet=rs0&directConnection=true&authSource=admin}
      AUTH_SECRET: ${AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - htasker-net

  mongo:
    image: mongo:7
    container_name: htasker-mongo
    restart: unless-stopped
    # Replica set is required by Prisma for transactions
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--auth"]
    # Do NOT expose MongoDB port to host by default — keep it internal.
    # Uncomment the line below only for local development debugging:
    # ports:
    #   - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?Set MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?Set MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: htasker
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - htasker-net

  # Replica set initializer — runs once then exits
  mongo-init-rs:
    image: mongo:7
    container_name: htasker-mongo-init
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
    command: >
      mongosh --host mongo:27017
        -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin
        --eval "try { rs.status(); print('RS already initialized') } catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }); print('RS initialized') }"
    networks:
      - htasker-net

volumes:
  mongo-data:
    driver: local

networks:
  htasker-net:
    driver: bridge
